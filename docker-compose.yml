version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: lumipuchi-postgres
    restart: always
    environment:
      POSTGRES_USER: lumipuchi
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lumipuchi_erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lumipuchi-redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: lumipuchi-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://lumipuchi:password123@postgres:5432/lumipuchi_erp
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: lumipuchi-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
