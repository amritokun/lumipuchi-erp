version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: lumipuchi-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-lumipuchi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-lumipuchi_erp}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lumipuchi-redis
    restart: always

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: lumipuchi-api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-lumipuchi}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-lumipuchi_erp}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: lumipuchi-web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=https://${API_DOMAIN}
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: lumipuchi-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - WEB_DOMAIN=${WEB_DOMAIN}
      - API_DOMAIN=${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
